name: SDK CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  windows-sdk:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Cache MIPS toolchain
        uses: actions/cache@v4
        with:
          path: .toolchain
          key: mipsel-none-elf-15.2.0-8ba866e25c9826ee-full-v1

      - name: Install verified MIPS toolchain
        shell: pwsh
        run: .\scripts\setup_toolchain.ps1

      - name: Run full test suite
        run: python -m unittest discover -s reverse -p "test_*.py"

      - name: Build Python distributions
        run: python -m build

      - name: Smoke-test installed wheel
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          python -m venv build\wheel-smoke
          & build\wheel-smoke\Scripts\python.exe -m pip install $wheel
          $prefix = (Resolve-Path .toolchain\bin).Path + "\mipsel-none-elf-"
          & build\wheel-smoke\Scripts\bda-pack.exe `
            example\basic\hello_world\hello_world_msgbox.c `
            --prefix $prefix --title WheelSmoke --category 9 `
            -o build\WheelSmoke.bda
          & build\wheel-smoke\Scripts\bda-validate.exe build\WheelSmoke.bda

      - name: Check repository diff
        shell: pwsh
        run: |
          git diff --check
          $status = git status --short
          if ($status) {
            $status
            throw "Tests or generators changed tracked repository files."
          }
